<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | CAMY</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main class="auth">
    <section class="auth-card">
      <div class="logo-container">
        <img src="logo_Camy_sinfondo.png" class="logo" alt="CAMY">
      </div>

      <form id="loginForm" class="form">
        <label>
          Usuario
          <input name="username" class="input" placeholder="vendedor" autocomplete="username" required />
        </label>

        <label>
          Contraseña
          <input name="password" type="password" class="input" placeholder="••••" autocomplete="current-password" required />
        </label>

        <button class="btn primary full" type="submit">Entrar</button>
        <p id="loginError" class="error" hidden></p>


      </form>
    </section>
  </main>

  <script src="login.js"></script>
</body>
</html>
